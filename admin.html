<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - CZ12</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; min-height: 100vh; }
    .header { background: #1a73e8; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; text-decoration: none; display: inline-block; transition: all 0.2s; }
    .btn-primary { background: #fff; color: #1a73e8; }
    .btn-primary:hover { background: #e8f0fe; }
    .btn-secondary { background: #f0f2f5; color: #333; }
    .btn-danger { background: #d93025; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-approve { background: #137333; color: #fff; }
    .btn-approve:hover { background: #0f5325; }
    .btn-add-user { background: #1565c0; color: #fff; padding: 10px 20px; font-size: 14px; }
    .btn-add-user:hover { background: #0d47a1; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
    .card-header { background: #f8f9fa; padding: 14px 20px; border-bottom: 1px solid #e8e8e8; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
    .card-body { padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    th { background: #f8f9fa; color: #666; font-weight: 500; font-size: 13px; }
    tr:hover { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
    .badge-approved { background: #e6f4ea; color: #137333; }
    .badge-pending { background: #fef7e0; color: #b06000; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; width: 100%; max-width: 420px; padding: 28px; }
    .modal-title { font-size: 18px; margin-bottom: 20px; font-weight: 600; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
    .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #1a73e8; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-btns .btn { padding: 8px 20px; }
    .empty { text-align: center; padding: 30px; color: #999; font-size: 14px; }
    .info-box { background: #e8f0fe; border: 1px solid #bcd; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; font-size: 13px; color: #1a73e8; line-height: 1.6; }
    .login-prompt { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-prompt .card { max-width: 400px; margin: 0 auto; text-align: center; }
    .login-prompt .card-body { padding: 40px; }
    .login-prompt p { color: #666; margin-bottom: 16px; }
    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card { flex: 1; min-width: 120px; background: #f8f9fa; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #1a73e8; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
    .tab-bar { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ CZ12 管理后台</h1>
    <div class="header-right">
      <span id="userInfo" style="font-size:13px;opacity:0.9"></span>
      <a href="main.html" class="btn btn-primary">返回主页</a>
      <button class="btn btn-secondary" id="logoutBtn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="container">
    <div class="info-box" id="adminNotice">
      ℹ️ <b>管理员功能：</b>管理已授权用户列表。用户注册后需管理员授权才能登录。
    </div>

    <!-- 统计 -->
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="statWorksites">-</div><div class="label">工点数</div></div>
      <div class="stat-card"><div class="num" id="statDevices">-</div><div class="label">设备数</div></div>
      <div class="stat-card"><div class="num" id="statApproved">-</div><div class="label">已授权用户</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>👥 已授权用户管理</span>
        <button class="btn btn-add-user" onclick="openAddUserModal()">➕ 添加用户</button>
      </div>
      <div class="card-body" style="padding:0">
        <table>
          <thead>
            <tr>
              <th>邮箱</th>
              <th>授权状态</th>
              <th>添加时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
        <div id="emptyUsers" class="empty" style="display:none">暂无已授权用户</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        📊 数据概览
      </div>
      <div class="card-body">
        <div class="stat-row">
          <div class="stat-card"><div class="num" id="statNormal">-</div><div class="label">正常设备</div></div>
          <div class="stat-card"><div class="num" id="statWarn">-</div><div class="label">待整改</div></div>
          <div class="stat-card"><div class="num" id="statStopped">-</div><div class="label">停用</div></div>
        </div>
        <div style="margin-top:16px" id="worksiteStats"></div>
      </div>
    </div>
  </div>

  <!-- 添加用户弹窗 -->
  <div id="addUserModal" class="modal">
    <div class="modal-box">
      <div class="modal-title">添加授权用户</div>
      <div class="form-group">
        <label>用户邮箱 *</label>
        <input type="email" id="newUserEmail" placeholder="请输入用户邮箱">
      </div>
      <div class="form-group">
        <label>密码 *（初次授权请设置密码）</label>
        <input type="password" id="newUserPass" placeholder="请输入登录密码（至少6位）" minlength="6">
      </div>
      <div class="form-group">
        <label>确认密码 *</label>
        <input type="password" id="newUserPass2" placeholder="请再次输入密码">
      </div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeAddUserModal()">取消</button>
        <button class="btn btn-primary" onclick="saveNewUser()">确认添加</button>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://thvpdhayyyfgddzwffzv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_M12fCv3XXGBkqV7iVELxhg_Ez_qaUOJ';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_EMAIL = '18006855@qq.com';
    let currentUser = null;
    let isAdmin = false;
    let approvedUsers = [];
    let worksites = [];
    let devices = [];

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        currentUser = session.user;
        const { data: approved } = await sb.from('approved_users').select('*').eq('user_id', session.user.id).maybeSingle();
        isAdmin = currentUser.email === ADMIN_EMAIL && !!approved;
      }

      if (!isAdmin) {
        document.getElementById('userInfo').textContent = session ? (currentUser.email) : '';
        return;
      }

      document.getElementById('userInfo').textContent = '🔧 ' + currentUser.email;
      await loadData();
    }

    async function loadData() {
      const [au, ws, ds] = await Promise.all([
        sb.from('approved_users').select('*').order('created_at'),
        sb.from('worksites').select('*'),
        sb.from('devices').select('*')
      ]);
      approvedUsers = au.data || [];
      worksites = ws.data || [];
      devices = ds.data || [];
      renderUsers();
      renderStats();
    }

    function renderUsers() {
      const tbody = document.getElementById('usersTable');
      const empty = document.getElementById('emptyUsers');
      if (approvedUsers.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      tbody.innerHTML = approvedUsers.map(u => {
        const created = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
        return '<tr>' +
          '<td>' + u.email + '</td>' +
          '<td><span class="badge badge-approved">✅ 已授权</span></td>' +
          '<td>' + created + '</td>' +
          '<td><button class="btn btn-danger" style="padding:4px 10px;font-size:12px" onclick="removeUser(\'' + u.id + '\')">移除授权</button></td>' +
          '</tr>';
      }).join('');
    }

    function renderStats() {
      document.getElementById('statWorksites').textContent = worksites.length;
      document.getElementById('statDevices').textContent = devices.length;
      document.getElementById('statApproved').textContent = approvedUsers.length;
      document.getElementById('statNormal').textContent = devices.filter(d => d.status === '正常').length;
      document.getElementById('statWarn').textContent = devices.filter(d => d.status === '待整改').length;
      document.getElementById('statStopped').textContent = devices.filter(d => d.status === '停用').length;

      // 各工点设备统计
      const wsStats = worksites.map(w => {
        const count = devices.filter(d => d.worksite_id === w.id).length;
        return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px"><span>' + w.name + '</span><span style="color:#888">' + count + ' 台</span></div>';
      }).join('');
      document.getElementById('worksiteStats').innerHTML = '<div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px">各工点设备数量</div>' + (wsStats || '<div style="color:#999;font-size:13px">暂无数据</div>');
    }

    function openAddUserModal() {
      document.getElementById('addUserModal').classList.add('show');
      document.getElementById('newUserEmail').value = '';
      document.getElementById('newUserPass').value = '';
      document.getElementById('newUserPass2').value = '';
    }
    function closeAddUserModal() {
      document.getElementById('addUserModal').classList.remove('show');
    }

    async function saveNewUser() {
      const email = document.getElementById('newUserEmail').value.trim();
      const pass = document.getElementById('newUserPass').value;
      const pass2 = document.getElementById('newUserPass2').value;

      if (!email) { alert('请输入邮箱'); return; }
      if (pass.length < 6) { alert('密码至少6位'); return; }
      if (pass !== pass2) { alert('两次密码不一致'); return; }

      try {
        // 1. 先检查是否已注册
        const { data: existing } = await sb
          .from('approved_users')
          .select('*')
          .eq('email', email)
          .maybeSingle();

        if (existing) {
          alert('该邮箱已在授权列表中');
          return;
        }

        // 2. 创建 Auth 用户
        const { data: authData, error: authErr } = await sb.auth.signUp({ email, password: pass });
        if (authErr) throw authErr;

        // 3. 加入 approved_users
        await sb.from('approved_users').insert({
          user_id: authData.user.id,
          email: email,
          approved: true
        });

        alert('✅ 用户创建并授权成功！');
        closeAddUserModal();
        loadData();
      } catch (err) {
        alert('操作失败：' + err.message);
      }
    }

    async function removeUser(id) {
      if (!confirm('确定移除该用户授权？用户将无法登录。')) return;
      try {
        await sb.from('approved_users').delete().eq('id', id);
        loadData();
      } catch (err) {
        alert('移除失败：' + err.message);
      }
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
