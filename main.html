<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1565C0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CZ12标设备管理</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
</head>
<body>
    <!-- 主页面 - 工点列表（访客模式） -->
    <div id="main-page" class="page">
        <header class="header">
            <h2>🏗️ CZ12标设备管理</h2>
            <div class="header-actions">
                <button id="btn-refresh" class="btn-icon" title="刷新">🔄</button>
                <a href="index.html" class="btn-icon" title="登录">🔑</a>
            </div>
        </header>
        
        <div class="user-info">
            <span style="color: #666; font-size: 13px;">👁️ 访客模式（只读）</span>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <select id="filter-org" class="filter-select">
                <option value="">全部单位</option>
                <option value="局指">局指</option>
                <option value="一分部">一分部</option>
                <option value="二分部">二分部</option>
            </select>
            <select id="filter-type" class="filter-select">
                <option value="">全部分类</option>
                <option value="大中型设备">大中型设备</option>
                <option value="特种设备">特种设备</option>
            </select>
            <input type="text" id="filter-search" class="filter-input" placeholder="🔍 搜索设备名称">
        </div>

        <div class="content">
            <div id="worksite-list" class="list-container">
                <!-- 工点列表动态加载 -->
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/supabase-sdk.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
    /**
     * 访客模式 - 仅查看，不登录
     */
    const SUPABASE_URL = 'https://thvpdhayyyfgddzwffzv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_M12fCv3XXGBkqV7iVELxhg_Ez_qaUOJ';

    let supabase = null;
    let currentUser = null;

    const DEVICE_LIMITS = { '局指': 100, '一分部': 300, '二分部': 300 };
    let filterOrg = '';
    let filterType = '';
    let filterSearch = '';
    let allWorksites = [];

    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), duration);
    }

    function getDeviceLimit(org) { return DEVICE_LIMITS[org] || 999; }

    function getOrgClass(org) {
        if (org === '局指') return 'juzhi';
        if (org === '一分部') return 'yifenbu';
        if (org === '二分部') return 'erfenbu';
        return '';
    }

    async function initSupabase() {
        if (typeof window.supabase !== 'undefined') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return true;
        }
        return false;
    }

    async function loadWorksites() {
        const listContainer = document.getElementById('worksite-list');
        listContainer.innerHTML = '<div class="loading">加载中...</div>';

        try {
            const { data: worksites, error } = await supabase
                .from('worksites')
                .select('*, devices(count)')
                .order('created_at', { ascending: false });

            if (error) throw error;

            allWorksites = worksites || [];

            let filtered = allWorksites;
            if (filterOrg) filtered = filtered.filter(ws => ws.org === filterOrg);
            if (filterSearch) {
                const search = filterSearch.toLowerCase();
                filtered = filtered.filter(ws => ws.name.toLowerCase().includes(search));
            }

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔧</div>
                        <p>${allWorksites.length === 0 ? '暂无工点数据' : '筛选结果为空'}</p>
                    </div>`;
                return;
            }

            listContainer.innerHTML = filtered.map(ws => {
                const deviceCount = ws.devices?.[0]?.count || 0;
                const limit = getDeviceLimit(ws.org);
                return `
                    <div class="card" onclick="goToWorksite('${ws.id}')">
                        <div class="card-header">
                            <div>
                                <div class="card-title">
                                    ${escapeHtml(ws.name)}
                                    <span class="org-badge ${getOrgClass(ws.org)}">${ws.org}</span>
                                </div>
                                <div class="card-meta">创建于 ${formatDate(ws.created_at)}</div>
                            </div>
                        </div>
                        <div class="card-stats">
                            <span>📋 ${deviceCount} 台设备</span>
                            <span style="color: #666">(上限 ${limit})</span>
                        </div>
                    </div>`;
            }).join('');

        } catch (error) {
            console.error('加载失败:', error);
            listContainer.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>`;
        }
    }

    function goToWorksite(id) { window.location.href = `worksite.html?id=${id}`; }

    function handleFilterChange() {
        filterOrg = document.getElementById('filter-org').value;
        filterType = document.getElementById('filter-type').value;
        filterSearch = document.getElementById('filter-search').value.trim();
        loadWorksites();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await initSupabase();
        loadWorksites();

        document.getElementById('btn-refresh')?.addEventListener('click', loadWorksites);
        document.getElementById('filter-org')?.addEventListener('change', handleFilterChange);
        document.getElementById('filter-type')?.addEventListener('change', handleFilterChange);
        document.getElementById('filter-search')?.addEventListener('input', handleFilterChange);
    });
    </script>
</body>
</html>
