<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备管理 - CZ12</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; min-height: 100vh; }
    .header { background: #1a73e8; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 18px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right span { font-size: 13px; opacity: 0.9; }
    .btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .btn-primary { background: #fff; color: #1a73e8; }
    .btn-primary:hover { background: #e8f0fe; }
    .btn-danger { background: #d93025; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-edit { background: #1a73e8; color: #fff; }
    .btn-edit:hover { background: #1557b0; }
    .btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-add { background: #137333; color: #fff; padding: 10px 20px; font-size: 14px; margin-bottom: 16px; }
    .btn-add:hover { background: #0f5325; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .search-bar { margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .search-bar input { flex: 1; min-width: 200px; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
    .card-header { background: #f8f9fa; padding: 14px 20px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; cursor: pointer; }
    .card-header h3 { font-size: 16px; color: #1a73e8; }
    .card-header .meta { font-size: 12px; color: #666; margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-body { padding: 16px 20px; }
    .device-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; gap: 8px; }
    .device-item:last-child { border-bottom: none; }
    .device-info { flex: 1; }
    .device-name { font-size: 15px; font-weight: 500; color: #222; }
    .device-detail { font-size: 12px; color: #888; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .badge-ok { background: #e6f4ea; color: #137333; }
    .badge-warn { background: #fce8e6; color: #c5221f; }
    .badge-pending { background: #fef7e0; color: #b06000; }
    .badge-info { background: #e8f0fe; color: #1a73e8; }
    .photo-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid #eee; cursor: pointer; }
    .photo-thumb:hover { border-color: #1a73e8; }
    .photos-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 28px; }
    .modal-title { font-size: 18px; margin-bottom: 20px; font-weight: 600; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1a73e8; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-btns .btn { padding: 8px 20px; }
    .login-banner { background: #e8f0fe; border: 1px solid #bcd; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #1a73e8; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .section-title { font-size: 14px; color: #888; margin-bottom: 10px; padding-left: 4px; }
    .no-data-msg { padding: 20px; text-align: center; color: #999; }
    .img-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
    .img-modal.show { display: flex; }
    .img-modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    @media (max-width: 600px) {
      .header { padding: 12px 14px; }
      .card-header { padding: 12px 14px; }
      .card-body { padding: 12px 14px; }
      .container { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏗️ CZ12 设备管理系统</h1>
    <div class="header-right">
      <span id="userInfo"></span>
      <a href="index.html" class="btn btn-primary" id="loginBtn">登录</a>
      <a href="admin.html" class="btn btn-secondary" id="adminBtn" style="display:none">管理</a>
      <button class="btn btn-secondary" id="logoutBtn" style="display:none" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="container">
    <div id="loginBanner" class="login-banner">
      <span>👁️ 当前为游客模式，仅可查看数据</span>
      <a href="index.html" class="btn btn-primary" style="padding:4px 12px;font-size:12px">登录后可管理数据</a>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 搜索工点或设备名称..." oninput="renderWorksites()">
      <select id="filterStatus" onchange="renderWorksites()">
        <option value="">全部状态</option>
        <option value="正常">正常</option>
        <option value="维修中">维修中</option>
        <option value="报废">报废</option>
      </select>
    </div>

    <div id="addBtnArea" style="display:none">
      <button class="btn btn-add" onclick="openWorksiteModal()">➕ 添加工点</button>
      <button class="btn btn-add" style="background:#1565c0;margin-left:8px" onclick="openDeviceModal()">🔧 添加设备</button>
    </div>

    <div id="worksitesList"></div>
  </div>

  <!-- 图片查看 -->
  <div id="imgModal" class="img-modal" onclick="closeImgModal()">
    <img id="imgModalSrc" src="" alt="查看图片">
  </div>

  <!-- 工点弹窗 -->
  <div id="worksiteModal" class="modal">
    <div class="modal-box">
      <div class="modal-title" id="worksiteModalTitle">添加工点</div>
      <input type="hidden" id="worksiteId">
      <div class="form-group">
        <label>工点名称 *</label>
        <input type="text" id="wName" placeholder="如：1号拌合站">
      </div>
      <div class="form-group">
        <label>分部</label>
        <select id="wBranch">
          <option value="">请选择</option>
          <option value="局指">局指</option>
          <option value="一分部">一分部</option>
          <option value="二分部">二分部</option>
        </select>
      </div>
      <div class="form-group">
        <label>位置/地址</label>
        <input type="text" id="wLocation" placeholder="如：DK100+500">
      </div>
      <div class="form-group">
        <label>备注</label>
        <textarea id="wNote" placeholder="备注信息..."></textarea>
      </div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeWorksiteModal()">取消</button>
        <button class="btn btn-primary" onclick="saveWorksite()">保存</button>
      </div>
    </div>
  </div>

  <!-- 设备弹窗 -->
  <div id="deviceModal" class="modal">
    <div class="modal-box">
      <div class="modal-title" id="deviceModalTitle">添加设备</div>
      <input type="hidden" id="deviceId">
      <div class="form-group">
        <label>所属工点 *</label>
        <select id="dWorksite"><option value="">请选择工点</option></select>
      </div>
      <div class="form-group">
        <label>设备名称 *</label>
        <input type="text" id="dName" placeholder="如：混凝土搅拌机">
      </div>
      <div class="form-group">
        <label>设备类型</label>
        <select id="dType">
          <option value="">请选择</option>
          <option value="大中型设备">大中型设备</option>
          <option value="特种设备">特种设备</option>
          <option value="小型工装">小型工装</option>
          <option value="压力容器">压力容器</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>型号/规格</label>
        <input type="text" id="dModel" placeholder="如：HZS120">
      </div>
      <div class="form-group">
        <label>序列号</label>
        <input type="text" id="dSerial" placeholder="设备编号">
      </div>
      <div class="form-group">
        <label>状态</label>
        <select id="dStatus">
          <option value="正常">正常</option>
          <option value="维修中">维修中</option>
          <option value="报废">报废</option>
        </select>
      </div>
      <div class="form-group">
        <label>备注</label>
        <textarea id="dNote" placeholder="备注信息..."></textarea>
      </div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeDeviceModal()">取消</button>
        <button class="btn btn-primary" onclick="saveDevice()">保存</button>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://thvpdhayyyfgddzwffzv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_M12fCv3XXGBkqV7iVELxhg_Ez_qaUOJ';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let isApproved = false;
    let worksites = [];
    let devices = [];

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        currentUser = session.user;
        // 用 email 查询审批状态（与 index.html 保持一致）
        const { data: approved } = await sb
          .from('approved_users')
          .select('*')
          .eq('email', session.user.email)
          .maybeSingle();
        isApproved = !!(approved && approved.approved);
        updateAuthUI();
      }
      await loadData();
    }

    function updateAuthUI() {
      const loginBanner = document.getElementById('loginBanner');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const adminBtn = document.getElementById('adminBtn');
      const addBtnArea = document.getElementById('addBtnArea');
      const userInfo = document.getElementById('userInfo');

      if (isApproved) {
        loginBanner.style.display = 'none';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
        adminBtn.style.display = 'inline-block';
        addBtnArea.style.display = 'block';
        userInfo.textContent = '👤 ' + currentUser.email;
      } else if (currentUser) {
        loginBanner.style.display = 'flex';
        loginBanner.innerHTML = '⚠️ 您的账号未通过审批，无法管理数据。<a href="index.html" class="btn btn-primary" style="padding:4px 12px;font-size:12px">重新登录</a>';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
        adminBtn.style.display = 'none';
        addBtnArea.style.display = 'none';
        userInfo.textContent = '⚠️ ' + currentUser.email;
      } else {
        loginBanner.style.display = 'flex';
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
        adminBtn.style.display = 'none';
        addBtnArea.style.display = 'none';
        userInfo.textContent = '';
      }
    }

    async function loadData() {
      const [ws, ds] = await Promise.all([
        sb.from('worksites').select('*').order('created_at', { ascending: false }),
        sb.from('devices').select('*').order('created_at', { ascending: false })
      ]);
      worksites = ws.data || [];
      devices = ds.data || [];
      renderWorksites();
    }

    function getStatusBadge(status) {
      if (status === '正常') return '<span class="badge badge-ok">正常</span>';
      if (status === '维修中') return '<span class="badge badge-warn">维修中</span>';
      if (status === '报废') return '<span class="badge badge-pending">报废</span>';
      return '<span class="badge badge-info">' + status + '</span>';
    }

    async function renderWorksites() {
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const filterStatus = document.getElementById('filterStatus').value;
      const filtered = worksites.filter(w => !search || w.name.toLowerCase().includes(search));

      const list = document.getElementById('worksitesList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无工点数据</div>';
        return;
      }

      let html = '';
      for (const w of filtered) {
        const wDevices = devices.filter(d => d.worksite_id === w.id);
        const filteredDevices = wDevices.filter(d => {
          if (filterStatus && d.status !== filterStatus) return false;
          if (search && !d.name.toLowerCase().includes(search) && !(d.device_type && d.device_type.toLowerCase().includes(search))) return false;
          return true;
        });

        html += '<div class="card">';
        html += '<div class="card-header" onclick="toggleCard(this)">';
        html += '<div><h3>' + w.name + '</h3>';
        if (w.branch) html += '<div class="meta">' + w.branch + (w.location ? ' · ' + w.location : '') + '</div>';
        html += '</div>';
        html += '<div class="card-actions">';
        if (isApproved) {
          html += '<button class="btn btn-edit" onclick="event.stopPropagation();openDeviceModal(null,' + w.id + ')">🔧 设备</button>';
          html += '<button class="btn btn-edit" onclick="event.stopPropagation();openWorksiteModal(' + w.id + ')">✏️ 编辑</button>';
          html += '<button class="btn btn-danger" onclick="event.stopPropagation();deleteWorksite(' + w.id + ')">🗑️ 删除</button>';
        }
        html += '<span class="badge badge-info">' + wDevices.length + ' 台设备</span>';
        html += '</div></div>';

        html += '<div class="card-body" style="display:none">';
        if (w.note) html += '<p style="font-size:13px;color:#666;margin-bottom:12px">' + w.note + '</p>';
        html += '<div class="section-title">设备列表</div>';

        if (filteredDevices.length === 0) {
          html += '<div class="no-data-msg">此工点暂无设备</div>';
        } else {
          for (const d of filteredDevices) {
            html += '<div class="device-item">';
            html += '<div class="device-info">';
            html += '<div class="device-name">' + d.name + ' ' + getStatusBadge(d.status) + '</div>';
            html += '<div class="device-detail">';
            if (d.device_type) html += '<span>📋 ' + d.device_type + '</span>';
            if (d.model) html += '<span>🛠️ ' + d.model + '</span>';
            if (d.serial) html += '<span>🔢 ' + d.serial + '</span>';
            if (d.note) html += '<span>📝 ' + d.note + '</span>';
            html += '</div>';
            html += '<div class="photos-row" id="photos-' + d.id + '"></div>';
            html += '</div>';
            if (isApproved) {
              html += '<div class="card-actions">';
              html += '<button class="btn btn-edit" style="padding:4px 10px;font-size:12px" onclick="openDeviceModal(' + d.id + ')">✏️ 编辑</button>';
              html += '<button class="btn btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteDevice(' + d.id + ')">🗑️ 删除</button>';
              html += '</div>';
            }
            html += '</div>';
          }
        }
        html += '</div></div>';
      }
      list.innerHTML = html;

      // 异步加载照片
      for (const d of devices) {
        const el = document.getElementById('photos-' + d.id);
        if (el) {
          const { data } = await sb.from('photos').select('*').eq('device_id', d.id).order('created_at');
          if (data && data.length > 0) {
            el.innerHTML = data.map(p => {
              const url = p.url.startsWith('http') ? p.url : SUPABASE_URL + '/storage/v1/object/public/' + p.url;
              return '<img class="photo-thumb" src="' + url + '" onclick="showImg(\'' + url + '\')" alt="照片">';
            }).join('');
          }
        }
      }
    }

    function toggleCard(header) {
      const body = header.nextElementSibling;
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
    }

    function showImg(url) {
      document.getElementById('imgModalSrc').src = url;
      document.getElementById('imgModal').classList.add('show');
    }
    function closeImgModal() {
      document.getElementById('imgModal').classList.remove('show');
    }

    // ============ 工点 CRUD ============
    function openWorksiteModal(id) {
      document.getElementById('worksiteModal').classList.add('show');
      document.getElementById('worksiteModalTitle').textContent = id ? '编辑工点' : '添加工点';
      document.getElementById('worksiteId').value = id || '';
      if (id) {
        const w = worksites.find(x => x.id === id);
        if (w) {
          document.getElementById('wName').value = w.name || '';
          document.getElementById('wBranch').value = w.branch || '';
          document.getElementById('wLocation').value = w.location || '';
          document.getElementById('wNote').value = w.note || '';
        }
      } else {
        ['wName','wBranch','wLocation','wNote'].forEach(id => document.getElementById(id).value = '');
      }
    }
    function closeWorksiteModal() {
      document.getElementById('worksiteModal').classList.remove('show');
    }
    async function saveWorksite() {
      const id = document.getElementById('worksiteId').value;
      const name = document.getElementById('wName').value.trim();
      if (!name) { alert('请填写工点名称'); return; }
      const data = {
        name,
        branch: document.getElementById('wBranch').value,
        location: document.getElementById('wLocation').value,
        note: document.getElementById('wNote').value
      };
      if (id) {
        const { error } = await sb.from('worksites').update(data).eq('id', id);
        if (error) { alert('保存失败：' + error.message); return; }
      } else {
        const { error } = await sb.from('worksites').insert(data);
        if (error) { alert('添加失败：' + error.message); return; }
      }
      closeWorksiteModal();
      loadData();
    }
    async function deleteWorksite(id) {
      if (!confirm('确认删除此工点？将同时删除该工点下所有设备！')) return;
      const devs = devices.filter(d => d.worksite_id === id);
      for (const d of devs) {
        await sb.from('photos').delete().eq('device_id', d.id);
      }
      await sb.from('devices').delete().eq('worksite_id', id);
      await sb.from('worksites').delete().eq('id', id);
      loadData();
    }

    // ============ 设备 CRUD ============
    async function openDeviceModal(id, preselectedWorksiteId) {
      document.getElementById('deviceModal').classList.add('show');
      const sel = document.getElementById('dWorksite');
      sel.innerHTML = '<option value="">请选择工点</option>' +
        worksites.map(w => '<option value="' + w.id + '">' + w.name + '</option>').join('');

      document.getElementById('deviceModalTitle').textContent = id ? '编辑设备' : '添加设备';
      document.getElementById('deviceId').value = id || '';
      ['dName','dModel','dSerial','dNote'].forEach(x => document.getElementById(x).value = '');
      document.getElementById('dType').value = '';
      document.getElementById('dStatus').value = '正常';
      document.getElementById('dWorksite').value = preselectedWorksiteId || '';

      if (id) {
        const d = devices.find(x => x.id === id);
        if (d) {
          document.getElementById('dName').value = d.name || '';
          document.getElementById('dWorksite').value = d.worksite_id || '';
          document.getElementById('dType').value = d.device_type || '';
          document.getElementById('dModel').value = d.model || '';
          document.getElementById('dSerial').value = d.serial || '';
          document.getElementById('dStatus').value = d.status || '正常';
          document.getElementById('dNote').value = d.note || '';
        }
      }
    }
    function closeDeviceModal() {
      document.getElementById('deviceModal').classList.remove('show');
    }
    async function saveDevice() {
      const id = document.getElementById('deviceId').value;
      const name = document.getElementById('dName').value.trim();
      const worksite_id = document.getElementById('dWorksite').value;
      if (!name) { alert('请填写设备名称'); return; }
      if (!worksite_id) { alert('请选择所属工点'); return; }
      const data = {
        name,
        worksite_id: worksite_id || null,
        device_type: document.getElementById('dType').value,
        model: document.getElementById('dModel').value,
        serial: document.getElementById('dSerial').value,
        status: document.getElementById('dStatus').value,
        note: document.getElementById('dNote').value
      };
      if (id) {
        const { error } = await sb.from('devices').update(data).eq('id', id);
        if (error) { alert('保存失败：' + error.message); return; }
      } else {
        const { error } = await sb.from('devices').insert(data);
        if (error) { alert('添加失败：' + error.message); return; }
      }
      closeDeviceModal();
      loadData();
    }
    async function deleteDevice(id) {
      if (!confirm('确认删除此设备？')) return;
      await sb.from('photos').delete().eq('device_id', id);
      await sb.from('devices').delete().eq('id', id);
      loadData();
    }

    async function logout() {
      await sb.auth.signOut();
      currentUser = null;
      isApproved = false;
      sessionStorage.clear();
      updateAuthUI();
      loadData();
    }

    init();
  </script>
</body>
</html>
