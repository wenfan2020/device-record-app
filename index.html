<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CZ12标设备管理系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;font-size:14px;line-height:1.5}
.page{display:none}.page.active{display:block}
a{color:#1565C0;text-decoration:none}
.header{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header h2{font-size:16px;flex:1}
.hbtn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:15px;cursor:pointer}
.user-bar{background:#fff;padding:8px 14px;display:flex;justify-content:space-between;font-size:12px;color:#666;border-bottom:1px solid #eee}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.b-admin{background:#e3f2fd;color:#1565C0}.b-pending{background:#fff3e0;color:#e65100}.b-green{background:#e8f5e9;color:#2e7d32}.b-yellow{background:#fff8e1;color:#f57c00}.b-red{background:#fce4ec;color:#c62828}
.filter{background:#fff;padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #eee}
.filter select,.filter input{flex:1;min-width:80px;padding:7px 9px;border:1px solid #ddd;border-radius:7px;font-size:13px}
.filter select{min-width:70px;flex:none}
.content{padding:12px;padding-bottom:80px}
.stats-row{display:flex;gap:10px;margin-bottom:14px}
.stat-card{flex:1;background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat-num{font-size:24px;font-weight:700;color:#1565C0}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.sg .stat-num{color:#2e7d32}.so .stat-num{color:#e65100}.sr .stat-num{color:#c62828}
.card{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-head{display:flex;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}
.card-actions button{background:none;border:none;font-size:14px;cursor:pointer;padding:4px 5px}
.card-meta{font-size:12px;color:#888;margin-top:3px}
.card-desc{font-size:12px;color:#aaa;margin-top:3px}
.card-foot{font-size:11px;color:#bbb;margin-top:6px;padding-top:6px;border-top:1px solid #eee}
.warn-card{background:#fff8e1!important;border-left:3px solid #ff9800}
.error-card{background:#fce4ec!important;border-left:3px solid #f44336}
.ob{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.oj{background:#e3f2fd;color:#1565C0}.oy{background:#e8f5e9;color:#2e7d32}.oe{background:#fff3e0;color:#e65100}
.ot{background:#e3f2fd;color:#1565C0}.os{background:#fce4ec;color:#c62828}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.dg{background:#4caf50}.do{background:#ff9800}.dr{background:#f44336}.db{background:#2196f3}
.sec-title{font-size:13px;font-weight:600;color:#444;margin:14px 0 8px}
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:48px;margin-bottom:10px}
.fab{position:fixed;right:16px;bottom:20px;width:52px;height:52px;background:#1565C0;color:#fff;border:none;border-radius:50%;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(21,101,192,0.4);z-index:50}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1565C0,#0d47a1)}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.login-box h1{font-size:18px;color:#1565C0;margin-bottom:3px;text-align:center}
.login-box .sub{color:#888;font-size:11px;margin-bottom:22px;text-align:center}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:9px;font-size:14px}
.form-group input:focus{outline:none;border-color:#1565C0}
.btn{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;display:block;text-align:center}
.btn-cancel{background:#f0f0f0;color:#666}
.btn-danger{background:#e53935}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.hint{background:#e3f2fd;border-radius:9px;padding:12px;margin-top:16px;font-size:12px;color:#1565C0;line-height:1.6}
.tac{text-align:center}.mt8{margin-top:8px}.mt12{margin-top:12px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal.hidden{display:none}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
.modal-head{padding:14px 16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:15px}
.modal-close{background:none;border:none;font-size:22px;color:#bbb;cursor:pointer}
.modal-body{padding:16px}
.modal-body .form-group{margin-bottom:11px}
.modal-foot{padding:12px 16px;border-top:1px solid #eee;display:flex;gap:8px}
.modal-foot .btn{flex:1}
.confirm-box{background:#fff;border-radius:16px;width:100%;max-width:300px;padding:22px;text-align:center}
.confirm-box p{font-size:14px;margin-bottom:18px}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:.95;pointer-events:none}
.loading{text-align:center;padding:40px;color:#aaa}
.hidden{display:none!important}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}
.pitem{aspect-ratio:1;overflow:hidden;border-radius:8px;background:#f5f5f5;position:relative}
.pitem img{width:100%;height:100%;object-fit:cover}
.pdel{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:none}
.pitem:hover .pdel{display:block}
.padd{aspect-ratio:1;border:2px dashed #ddd;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#ccc;cursor:pointer}
</style>
</head>
<body>

<div id="page-login" class="page active">
<div class="login-wrap">
<div class="login-box">
<h1>CZ12标设备管理系统</h1>
<div class="sub">川藏铁路雅安至林芝段 CZSCZQ-12标</div>
<div id="login-area">
<form id="login-form" onsubmit="handleLogin(event)">
<div class="form-group"><label>邮箱</label><input type="email" id="li-email" placeholder="请输入邮箱" required></div>
<div class="form-group"><label>密码</label><input type="password" id="li-pwd" placeholder="请输入密码" required></div>
<button type="submit" class="btn">登 录</button>
</form>
<div class="hint tac">还没有账号？<a href="#" onclick="showReg()">立即注册</a></div>
</div>
<div id="reg-area" class="hidden">
<form id="reg-form" onsubmit="handleReg(event)">
<div class="form-group"><label>姓名</label><input type="text" id="reg-name" placeholder="请输入姓名" required></div>
<div class="form-group"><label>邮箱</label><input type="email" id="reg-email" placeholder="请输入邮箱" required></div>
<div class="form-group"><label>密码</label><input type="password" id="reg-pwd" placeholder="设置密码" required minlength="6"></div>
<button type="submit" class="btn">注册并提交申请</button>
</form>
<div class="hint tac">已有账号？<a href="#" onclick="showLoginForm()">返回登录</a></div>
</div>
<div id="pending-area" class="hidden">
<div class="hint tac"><strong>注册成功！</strong><br>账号正在等待管理员审批。<div class="mt12"><a href="#" onclick="showLoginForm()">返回登录</a></div></div>
</div>
</div>
</div>

<div id="page-home" class="page">
<div class="header">
<h2>CZ12标设备管理</h2>
<button class="hbtn" onclick="refreshAll()" title="刷新">R</button>
<button class="hbtn" onclick="doExport()" title="导出">S</button>
<button class="hbtn" onclick="showUser()" title="用户">U</button>
</div>
<div class="user-bar">
<span id="u-name">-</span>
<span id="u-badge" class="badge">-</span>
</div>
<div class="filter">
<select id="f-org" onchange="loadStats()"><option value="">全部单位</option><option value="局指">局指</option><option value="一分部">一分部</option><option value="二分部">二分部</option></select>
</div>
<div class="content">
<div id="stats-area"><div class="loading">加载中...</div></div>
<div class="sec-title">工点列表</div>
<div id="ws-list"><div class="loading">加载中...</div></div>
</div>
<button class="fab" id="fab-ws" onclick="showAddWs()">+</button>
</div>

<div id="page-ws" class="page">
<div class="header">
<button class="hbtn" onclick="goHome()">L</button>
<h2 id="ws-title2">工点详情</h2>
<button class="hbtn" onclick="refreshWsDevs()">R</button>
</div>
<div class="filter">
<select id="f-dev-type" onchange="loadWsDevs()"><option value="">全部分类</option><option value="大中型设备">大中型设备</option><option value="特种设备">特种设备</option></select>
<select id="f-dev-status" onchange="loadWsDevs()"><option value="">全部状态</option><option value="正常">正常</option><option value="维修中">维修中</option><option value="停用">停用</option><option value="报废">报废</option></select>
</div>
<div class="filter" style="background:#f9f9f9">
<input type="text" id="f-dev-search" placeholder="搜索设备..." oninput="loadWsDevs()" style="max-width:none">
</div>
<div class="content">
<div id="ws-dev-list"><div class="loading">加载中...</div></div>
</div>
<button class="fab" onclick="showAddDev()">+</button>
</div>

<div id="page-dev" class="page">
<div class="header">
<button class="hbtn" id="dev-back">L</button>
<h2 id="dev-title2">设备详情</h2>
<button class="hbtn" onclick="editDev()">E</button>
</div>
<div class="content">
<div id="dev-detail"><div class="loading">加载中...</div></div>
</div>
</div>

<div id="m-ws" class="modal hidden">
<div class="modal-box">
<div class="modal-head"><h3 id="m-ws-title">添加工点</h3><button class="modal-close" onclick="modal('m-ws',false)">x</button></div>
<form onsubmit="saveWs(event)">
<div class="modal-body">
<input type="hidden" id="wsf-id">
<div class="form-group"><label>所属单位</label><select id="wsf-org"><option value="局指">局指</option><option value="一分部">一分部</option><option value="二分部">二分部</option></select></div>
<div class="form-group"><label>工点名称</label><input type="text" id="wsf-name" placeholder="如：一号拌合站" required></div>
<div class="form-group"><label>位置</label><input type="text" id="wsf-loc" placeholder="如：DK100+500"></div>
<div class="form-group"><label>备注</label><textarea id="wsf-note" rows="2"></textarea></div>
</div>
<div class="modal-foot">
<button type="button" class="btn btn-cancel" onclick="modal('m-ws',false)">取消</button>
<button type="submit" class="btn">保存</button>
</div>
</form>
</div>
</div>

<div id="m-dev" class="modal hidden">
<div class="modal-box">
<div class="modal-head"><h3 id="m-dev-title">添加设备</h3><button class="modal-close" onclick="modal('m-dev',false)">x</button></div>
<form onsubmit="saveDev(event)">
<div class="modal-body">
<input type="hidden" id="df-id">
<div class="form-group"><label>所属工点</label><select id="df-ws" required></select></div>
<div class="form-group"><label>设备名称</label><input type="text" id="df-name" placeholder="如：混凝土搅拌站" required></div>
<div class="form-group"><label>类别</label><select id="df-type"><option value="大中型设备">大中型设备</option><option value="特种设备">特种设备</option></select></div>
<div class="form-group"><label>状态</label><select id="df-status"><option value="正常">正常</option><option value="维修中">维修中</option><option value="停用">停用</option><option value="报废">报废</option></select></div>
<div class="form-group"><label>型号</label><input type="text" id="df-model" placeholder="设备型号"></div>
<div class="form-group"><label>出厂编号</label><input type="text" id="df-serial" placeholder="出厂编号"></div>
<div class="form-group"><label>厂家</label><input type="text" id="df-mfr" placeholder="生产厂家"></div>
<div class="form-group"><label>出厂日期</label><input type="date" id="df-mfg"></div>
<div class="form-group"><label>购置日期</label><input type="date" id="df-pur"></div>
<div class="form-group"><label>描述</label><textarea id="df-desc" rows="2"></textarea></div>
</div>
<div class="modal-foot">
<button type="button" class="btn btn-cancel" onclick="modal('m-dev',false)">取消</button>
<button type="submit" class="btn">保存</button>
</div>
</form>
</div>
</div>

<div id="m-photo" class="modal hidden">
<div class="modal-box">
<div class="modal-head"><h3>设备照片</h3><button class="modal-close" onclick="modal('m-photo',false)">x</button></div>
<div class="modal-body">
<div id="ph-dev-name" style="margin-bottom:10px;font-size:13px"></div>
<div class="pgrid" id="ph-grid"><div class="loading">加载中...</div></div>
<div class="padd mt8" onclick="doPhotoUpload()">+</div>
<input type="file" id="ph-input" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhUpload(event)">
</div>
<div class="modal-foot"><button class="btn btn-cancel" onclick="modal('m-photo',false)">关闭</button></div>
</div>
</div>

<div id="m-confirm" class="modal hidden">
<div class="confirm-box">
<p id="cf-msg">确定删除？</p>
<div class="btn-row">
<button class="btn btn-cancel" onclick="modal('m-confirm',false)">取消</button>
<button class="btn btn-danger" onclick="doCf()">删除</button>
</div>
</div>
</div>

<div id="m-user" class="modal hidden">
<div class="modal-box">
<div class="modal-head"><h3>用户中心</h3><button class="modal-close" onclick="modal('m-user',false)">x</button></div>
<div class="modal-body">
<div id="uinfo" style="margin-bottom:14px"></div>
</div>
<div class="modal-foot">
<button class="btn btn-cancel" onclick="modal('m-user',false)">关闭</button>
<button class="btn btn-danger" onclick="doLogout()">退出登录</button>
</div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/main.js"></script>
</body>
</html>
