<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备管理系统 - 登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 380px; max-width: 95vw; }
    h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #1a73e8; }
    .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
    .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #666; font-size: 15px; transition: all 0.2s; }
    .tab.active { color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: -2px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #1a73e8; }
    button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    button:hover { background: #1557b0; }
    button:disabled { background: #a0a0a0; cursor: not-allowed; }
    .msg { padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; display: none; }
    .msg.error { background: #fce8e6; color: #c5221f; border: 1px solid #fdc; }
    .msg.success { background: #e6f4ea; color: #137333; border: 1px solid #acd; }
    .msg.info { background: #e8f0fe; color: #1a73e8; border: 1px solid #bcd; }
    .link { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
    .link a { color: #1a73e8; text-decoration: none; }
    .back-link { text-align: center; margin-top: 12px; font-size: 13px; }
    .back-link a { color: #666; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏗️ CZ12设备管理系统</h1>
    <p class="subtitle">川藏铁路雅安至林芝段</p>
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="showTab('login')">登录</div>
      <div class="tab" id="tabRegister" onclick="showTab('register')">注册</div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" required placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" required placeholder="请输入密码">
      </div>
      <button type="submit" id="loginBtn">登录</button>
    </form>

    <!-- 注册表单 -->
    <form id="registerForm" style="display:none" onsubmit="return handleRegister(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" required placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" required placeholder="请输入密码（至少6位）" minlength="6">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="regPassword2" required placeholder="请再次输入密码">
      </div>
      <button type="submit" id="regBtn">注册</button>
    </form>

    <div class="link">
      <a href="main.html">👉 免登录查看工点列表</a>
    </div>
    <div class="back-link">
      <a href="main.html">← 返回查看页面</a>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://thvpdhayyyfgddzwffzv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_M12fCv3XXGBkqV7iVELxhg_Ez_qaUOJ';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('msg').style.display = 'none';
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.className = 'msg ' + type;
      el.textContent = text;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '登录中...';
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        // 检查是否已审批
        const { data: approved, error: apprErr } = await sb
          .from('approved_users')
          .select('*')
          .eq('user_id', data.user.id)
          .maybeSingle();

        if (apprErr) throw apprErr;
        if (!approved) {
          await sb.auth.signOut();
          showMsg('⚠️ 您的账号尚未通过审批，请联系管理员（18006855@qq.com）', 'error');
          btn.disabled = false;
          btn.textContent = '登录';
          return;
        }

        // 登录成功，写入session
        sessionStorage.setItem('user_id', data.user.id);
        sessionStorage.setItem('user_email', data.user.email);
        showMsg('✅ 登录成功！正在跳转...', 'success');
        setTimeout(() => window.location.href = 'main.html', 800);
      } catch (err) {
        showMsg('❌ 登录失败：' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '登录';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;

      if (password !== password2) {
        showMsg('❌ 两次密码输入不一致', 'error');
        return;
      }
      if (password.length < 6) {
        showMsg('❌ 密码长度至少6位', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = '注册中...';

      try {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;

        showMsg('📧 注册成功！请等待管理员审批后登录。\n（管理员邮箱：18006855@qq.com）', 'info');
        document.getElementById('registerForm').reset();
        btn.disabled = false;
        btn.textContent = '注册';
      } catch (err) {
        showMsg('❌ 注册失败：' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '注册';
      }
    }
  </script>
</body>
</html>
